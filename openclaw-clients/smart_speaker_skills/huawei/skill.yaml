# 华为小艺技能配置
# 文档：https://developer.huawei.com/consumer/cn/doc/development/HMS-Access-Guides

skill:
  name: "OpenClaw 家庭助手"
  version: "1.0.0"
  description: "智能家居控制、家庭账本、任务管理、语音对话"
  
  # 技能配置（创建技能后填写）
  skill_id: ""
  app_id: ""
  app_secret: ""
  
  # 意图定义
  intents:
    - name: "chat"
      samples:
        - "你好小艺"
        - "聊天"
        - "陪我聊聊"
        
    - name: "smart_home_control"
      samples:
        - "打开客厅的灯"
        - "关闭空调"
        - "调节温度"
        
    - name: "account_query"
      samples:
        - "查账单"
        - "今天花了多少钱"
        
    - name: "task_management"
      samples:
        - "添加任务"
        - "提醒我"
        
    - name: "shopping_list"
      samples:
        - "买东西"
        - "购物清单"

  # 回调配置
  webhook:
    url: "https://your-server.com/api/v1/smart-speaker/huawei"
    timeout: 3000
    
  # 小艺技能入口
  entry:
    icon_url: ""
    banner_url: ""

# 发布配置
publish:
  category: "生活服务"
  keywords:
    - "智能家居"
    - "家庭助手"
    - "语音控制"
