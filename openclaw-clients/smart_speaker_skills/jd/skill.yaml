# 京东叮咚音箱技能配置
# 文档：https://open.jd.com/

skill:
  name: "OpenClaw 家庭助手"
  version: "1.0.0"
  description: "智能家居控制、家庭账本、任务管理、语音对话"
  
  # 技能配置
  skill_id: ""
  skill_token: ""
  
  # 意图定义
  intents:
    - name: "chat"
      samples:
        - "你好"
        - "聊天"
        
    - name: "smart_home_control"
      samples:
        - "打开灯"
        - "关闭电器"
        
    - name: "account_query"
      samples:
        - "查账单"
        - "花了多少钱"

  # 回调配置
  webhook:
    url: "https://your-server.com/api/v1/smart-speaker/jd"
    timeout: 3000

# 发布配置
publish:
  category: "生活"
  keywords:
    - "智能家居"
    - "家庭管理"
