# 天猫精灵技能配置
# 文档：https://open.aligenie.com/doc

skill:
  name: "OpenClaw 家庭助手"
  version: "1.0.0"
  description: "智能家居控制、家庭账本、任务管理、语音对话"
  
  # 技能 ID（创建技能后填写）
  skill_id: ""
  skill_secret: ""
  
  # 意图定义
  intents:
    - name: "chat"
      samples:
        - "你好"
        - "聊天"
        - "陪我聊聊"
        - "今天怎么样"
        
    - name: "smart_home_control"
      samples:
        - "打开客厅的灯"
        - "关闭空调"
        - "把温度调到 25 度"
        - "打开窗帘"
        
    - name: "account_query"
      samples:
        - "今天花了多少钱"
        - "这个月支出多少"
        - "查一下账单"
        
    - name: "task_management"
      samples:
        - "添加一个任务"
        - "明天要做什么"
        - "提醒我买菜"
        
    - name: "shopping_list"
      samples:
        - "添加到购物清单"
        - "我要买苹果"
        - "购物清单上有什么"
        
    - name: "recipe_help"
      samples:
        - "怎么做红烧肉"
        - "教我做饭"
        - "有什么菜谱推荐"

  # 回调配置
  webhook:
    url: "https://your-server.com/api/v1/smart-speaker/tmall"
    timeout: 3000
    
  # 语音配置
  voice:
    tts_provider: "aliyun"
    voice_id: "longxiaochun"

# 发布配置
publish:
  category: "生活助手"
  keywords:
    - "智能家居"
    - "家庭助手"
    - "语音控制"
  test_accounts:
    - "test_user_1"
    - "test_user_2"
