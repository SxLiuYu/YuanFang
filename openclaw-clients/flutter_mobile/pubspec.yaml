name: openclaw_home_assistant
description: OpenClaw Home Assistant Mobile Client - 手机数据接入
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 网络请求
  http: ^0.13.5
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # 存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # 权限管理
  permission_handler: ^10.4.5
  
  # 设备信息
  device_info_plus: ^9.1.2
  package_info_plus: ^4.2.0
  
  # 位置
  location: ^4.4.0
  geolocator: ^10.1.0
  
  # 健康数据
  health: ^8.1.0
  
  # 日历
  device_calendar: ^4.3.0
  
  # 联系人
  contacts_service: ^0.6.3
  
  # 通话记录
  call_log: ^4.0.1
  
  # 短信
  sms_maintained: ^0.3.3
  
  # 电池
  battery_plus: ^4.1.0
  
  # 网络状态
  connectivity_plus: ^4.0.2
  
  # 加密
  encrypt: ^5.0.3
  
  # 语音
  speech_to_text: ^6.3.0
  
  # 通知
  flutter_local_notifications: ^16.0.0
  
  # UI组件
  fl_chart: ^0.66.0
  intl: ^0.19.0
  provider: ^6.1.1
  
  # 生物识别
  local_auth: ^2.1.0
  
  # 分享
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/