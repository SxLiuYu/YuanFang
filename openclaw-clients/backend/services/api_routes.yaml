# OpenClaw 后端 API 路由定义
# 所有功能模块的统一 API 接口

base_url: /api/v1

# ═══════════════════════════════════════════════════════════════
# 1. 智能家居控制
# ═══════════════════════════════════════════════════════════════
smart_home:
  prefix: /smart-home
  
  device:
    control: { method: POST, path: /device/control, desc: "控制设备" }
    status: { method: GET, path: /device/status, desc: "查询状态" }
    list: { method: GET, path: /device/list, desc: "设备列表" }
    
  scene:
    activate: { method: POST, path: /scene/activate, desc: "激活场景" }
    list: { method: GET, path: /scene/list, desc: "场景列表" }
    create: { method: POST, path: /scene/create, desc: "创建场景" }
    
  schedule:
    create: { method: POST, path: /schedule/create, desc: "创建定时" }
    list: { method: GET, path: /schedule/list, desc: "定时列表" }
    delete: { method: DELETE, path: /schedule/delete, desc: "删除定时" }
    
  energy:
    report: { method: GET, path: /energy/report, desc: "能耗报告" }
    realtime: { method: GET, path: /energy/realtime, desc: "实时能耗" }

# ═══════════════════════════════════════════════════════════════
# 2. 家庭财务
# ═══════════════════════════════════════════════════════════════
finance:
  prefix: /finance
  
  transaction:
    add: { method: POST, path: /transaction/add, desc: "添加交易" }
    query: { method: GET, path: /transaction/query, desc: "查询交易" }
    delete: { method: DELETE, path: /transaction/delete, desc: "删除交易" }
    update: { method: PUT, path: /transaction/update, desc: "更新交易" }
    
  report:
    daily: { method: GET, path: /report/daily, desc: "日报" }
    weekly: { method: GET, path: /report/weekly, desc: "周报" }
    monthly: { method: GET, path: /report/monthly, desc: "月报" }
    yearly: { method: GET, path: /report/yearly, desc: "年报" }
    
  budget:
    status: { method: GET, path: /budget/status, desc: "预算状态" }
    set: { method: POST, path: /budget/set, desc: "设置预算" }
    
  asset:
    summary: { method: GET, path: /asset/summary, desc: "资产汇总" }
    detail: { method: GET, path: /asset/detail, desc: "资产详情" }

# ═══════════════════════════════════════════════════════════════
# 3. 任务管理
# ═══════════════════════════════════════════════════════════════
task:
  prefix: /task
  
  create: { method: POST, path: /task/create, desc: "创建任务" }
  assign: { method: POST, path: /task/assign, desc: "分配任务" }
  list: { method: GET, path: /task/list, desc: "任务列表" }
  complete: { method: PUT, path: /task/complete, desc: "完成任务" }
  delete: { method: DELETE, path: /task/delete, desc: "删除任务" }
  update: { method: PUT, path: /task/update, desc: "更新任务" }
  
  stats:
    completion: { method: GET, path: /stats/completion, desc: "完成率" }
    ranking: { method: GET, path: /stats/ranking, desc: "排行榜" }
    points: { method: GET, path: /stats/points, desc: "积分" }

# ═══════════════════════════════════════════════════════════════
# 4. 购物清单
# ═══════════════════════════════════════════════════════════════
shopping:
  prefix: /shopping
  
  item:
    add: { method: POST, path: /item/add, desc: "添加物品" }
    check: { method: PUT, path: /item/check, desc: "勾选物品" }
    remove: { method: DELETE, path: /item/remove, desc: "删除物品" }
    
  list: { method: GET, path: /list, desc: "购物清单" }
  
  inventory:
    query: { method: GET, path: /inventory/query, desc: "库存查询" }
    update: { method: PUT, path: /inventory/update, desc: "库存更新" }
    
  price:
    compare: { method: GET, path: /price/compare, desc: "价格对比" }

# ═══════════════════════════════════════════════════════════════
# 5. 做菜助手
# ═══════════════════════════════════════════════════════════════
recipe:
  prefix: /recipe
  
  recommend: { method: GET, path: /recommend, desc: "推荐菜谱" }
  search: { method: GET, path: /search, desc: "搜索菜谱" }
  detail: { method: GET, path: /detail, desc: "菜谱详情" }
  favorite: { method: POST, path: /favorite, desc: "收藏菜谱" }
  
  timer:
    start: { method: POST, path: /timer/start, desc: "开始计时" }
    stop: { method: POST, path: /timer/stop, desc: "停止计时" }
    list: { method: GET, path: /timer/list, desc: "计时器列表" }
    
  nutrition:
    analyze: { method: GET, path: /nutrition/analyze, desc: "营养分析" }

