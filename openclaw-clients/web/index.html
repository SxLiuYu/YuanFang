<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 家庭助手 - Web 客户端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-bar {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .status-indicator.connected {
            background: #4CAF50;
        }
        
        .status-indicator.listening {
            background: #2196F3;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .message-area {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .message.assistant {
            background: #f0f0f0;
            color: #333;
        }
        
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
        }
        
        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .settings details {
            cursor: pointer;
        }
        
        .settings summary {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .typing-indicator {
            display: inline-block;
        }
        
        .typing-indicator span {
            animation: bounce 1.4s infinite;
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OpenClaw 家庭助手</h1>
        <p class="subtitle">Web 客户端 - 语音识别 + AI 对话</p>
        
        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">未连接</span>
        </div>
        
        <div class="message-area" id="messageArea">
            <div class="message assistant">
                你好！我是你的家庭助手。你可以点击"开始语音"按钮对我说话，或者直接输入文字。
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-primary" id="voiceBtn">🎤 开始语音</button>
            <button class="btn-secondary" id="clearBtn">🗑️ 清空</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="textInput" placeholder="输入消息..." />
            <button class="btn-primary" id="sendBtn" style="flex: 0 0 100px;">发送</button>
        </div>
        
        <div class="settings">
            <details>
                <summary>⚙️ 设置</summary>
                <div class="form-group">
                    <label>服务器地址:</label>
                    <input type="text" id="serverUrl" placeholder="https://api.openclaw.ai" value="https://api.openclaw.ai" />
                </div>
                <div class="form-group">
                    <label>WebSocket 服务器地址:</label>
                    <input type="text" id="wsUrl" placeholder="wss://api.openclaw.ai/ws" value="wss://api.openclaw.ai/ws" />
                </div>
                <button class="btn-secondary" id="saveSettings">保存设置</button>
            </details>
        </div>
    </div>

    <script>
        // 状态管理
        const state = {
            connected: false,
            listening: false,
            serverUrl: localStorage.getItem('server_url') || 'https://api.openclaw.ai',
            wsUrl: localStorage.getItem('ws_url') || 'wss://api.openclaw.ai/ws',
            ws: null,
            recognition: null
        };

        // DOM 元素
        const els = {
            statusIndicator: document.getElementById('statusIndicator'),
            statusText: document.getElementById('statusText'),
            messageArea: document.getElementById('messageArea'),
            voiceBtn: document.getElementById('voiceBtn'),
            clearBtn: document.getElementById('clearBtn'),
            textInput: document.getElementById('textInput'),
            sendBtn: document.getElementById('sendBtn'),
            serverUrl: document.getElementById('serverUrl'),
            wsUrl: document.getElementById('wsUrl'),
            saveSettings: document.getElementById('saveSettings')
        };

        // 初始化设置
        els.serverUrl.value = state.serverUrl;
        els.wsUrl.value = state.wsUrl;

        // 添加消息到界面
        function addMessage(text, type = 'assistant') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            els.messageArea.appendChild(msg);
            els.messageArea.scrollTop = els.messageArea.scrollHeight;
        }

        // 显示正在输入
        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'typing';
            msg.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            els.messageArea.appendChild(msg);
            els.messageArea.scrollTop = els.messageArea.scrollHeight;
        }

        // 移除正在输入
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        // 更新状态
        function updateStatus(connected, text) {
            state.connected = connected;
            if (connected) {
                els.statusIndicator.className = 'status-indicator connected';
            } else {
                els.statusIndicator.className = 'status-indicator';
            }
            els.statusText.textContent = text;
        }

        // 连接 WebSocket
        function connectWebSocket() {
            try {
                state.ws = new WebSocket(state.wsUrl);
                
                state.ws.onopen = () => {
                    updateStatus(true, '已连接');
                    addMessage('已连接到服务器', 'assistant');
                };

                state.ws.onmessage = (event) => {
                    hideTyping();
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'response') {
                            addMessage(data.content, 'assistant');
                        } else if (data.type === 'error') {
                            addMessage(data.message, 'error');
                        }
                    } catch (e) {
                        addMessage(event.data, 'assistant');
                    }
                };

                state.ws.onclose = () => {
                    updateStatus(false, '已断开');
                    addMessage('连接已断开，5 秒后重试...', 'error');
                    setTimeout(connectWebSocket, 5000);
                };

                state.ws.onerror = () => {
                    updateStatus(false, '连接错误');
                };
            } catch (e) {
                updateStatus(false, '连接失败');
                addMessage('无法连接到服务器：' + e.message, 'error');
            }
        }

        // 发送消息
        function sendMessage(text) {
            if (!text.trim()) return;
            
            addMessage(text, 'user');
            showTyping();
            
            if (state.connected && state.ws) {
                state.ws.send(JSON.stringify({
                    type: 'message',
                    content: text,
                    apiKey: state.apiKey
                }));
            } else {
                // 如果没有 WebSocket，直接调用 DashScope API
                callDashScopeAPI(text);
            }
            
            els.textInput.value = '';
        }

        // 调用服务端 AI API
        async function callDashScopeAPI(text) {
            const serverUrl = localStorage.getItem('server_url') || 'https://api.openclaw.ai';
            
            try {
                const response = await fetch(`${serverUrl}/api/ai/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: text
                    })
                });
                
                hideTyping();
                const data = await response.json();
                
                if (response.ok && data.success) {
                    addMessage(data.content, 'assistant');
                } else {
                    addMessage('API 错误：' + (data.error || '未知错误'), 'error');
                }
            } catch (e) {
                hideTyping();
                addMessage('请求失败：' + e.message, 'error');
            }
        }

        // 语音识别
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                state.recognition = new SpeechRecognition();
                state.recognition.lang = 'zh-CN';
                state.recognition.continuous = false;
                state.recognition.interimResults = false;

                state.recognition.onstart = () => {
                    state.listening = true;
                    els.statusIndicator.className = 'status-indicator listening';
                    els.statusText.textContent = '正在听...';
                    els.voiceBtn.textContent = '⏹️ 停止语音';
                };

                state.recognition.onend = () => {
                    state.listening = false;
                    updateStatus(state.connected, state.connected ? '已连接' : '未连接');
                    els.voiceBtn.textContent = '🎤 开始语音';
                };

                state.recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    sendMessage(transcript);
                };

                state.recognition.onerror = (event) => {
                    addMessage('语音识别错误：' + event.error, 'error');
                };
            } else {
                els.voiceBtn.disabled = true;
                els.voiceBtn.textContent = '⛔ 不支持语音';
                addMessage('您的浏览器不支持语音识别，请使用 Chrome 浏览器', 'error');
            }
        }

        // 事件监听
        els.voiceBtn.addEventListener('click', () => {
            if (state.recognition) {
                if (state.listening) {
                    state.recognition.stop();
                } else {
                    state.recognition.start();
                }
            }
        });

        els.sendBtn.addEventListener('click', () => sendMessage(els.textInput.value));
        els.textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage(els.textInput.value);
        });

        els.clearBtn.addEventListener('click', () => {
            els.messageArea.innerHTML = '<div class="message assistant">对话已清空</div>';
        });

        els.saveSettings.addEventListener('click', () => {
            state.apiKey = els.apiKey.value;
            state.wsUrl = els.wsUrl.value;
            localStorage.setItem('dashscope_api_key', state.apiKey);
            localStorage.setItem('ws_url', state.wsUrl);
            addMessage('设置已保存', 'assistant');
            
            // 重新连接
            if (state.ws) {
                state.ws.close();
            }
            connectWebSocket();
        });

        // 初始化
        initSpeechRecognition();
        connectWebSocket();
    </script>
</body>
</html>
