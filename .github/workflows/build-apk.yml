name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          openclaw-clients/android/.gradle
        key: ${{ runner.os }}-gradle-v4-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build with Gradle wrapper
      working-directory: openclaw-clients/android
      run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --build-cache

    - name: Rename APK with timestamp
      run: |
        TIMESTAMP=$(date +%Y%m%d_%H%M)
        cp openclaw-clients/android/app/build/outputs/apk/debug/app-debug.apk OpenClawHomeAssistant_${TIMESTAMP}.apk
        ls -la *.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-apk
        path: '*.apk'

    - name: Create Release
      if: github.ref == 'refs/heads/master'
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: "Release $(date +%Y%m%d)"
        tag_name: "v$(date +%Y%m%d)"
        draft: false
        prerelease: false
        files: '*.apk'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
