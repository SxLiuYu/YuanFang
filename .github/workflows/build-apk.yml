name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          openclaw-clients/android/.gradle
        key: ${{ runner.os }}-gradle-v6-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Diagnostic - Verify Gradle wrapper
      working-directory: openclaw-clients/android
      run: |
        chmod +x gradlew
        echo "=== gradlew version ==="
        ./gradlew --version 2>&1 || true
        echo ""
        echo "=== wrapper files ==="
        ls -la gradle/wrapper/
        echo ""
        echo "=== wrapper properties ==="
        cat gradle/wrapper/gradle-wrapper.properties
        echo ""
        echo "=== Java version ==="
        java -version 2>&1
        echo ""
        echo "=== ANDROID_HOME ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls "$ANDROID_HOME" 2>&1 || true

    - name: Build with Gradle wrapper
      working-directory: openclaw-clients/android
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --build-cache 2>&1 | tail -50
        echo "Exit code: ${PIPESTATUS[0]}"

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: 'gradle-output.log'
        retention-days: 3

    - name: Rename APK
      run: |
        ls -la openclaw-clients/android/app/build/outputs/apk/debug/ || echo "APK dir not found"
        cp openclaw-clients/android/app/build/outputs/apk/debug/app-debug.apk ./OpenClawHomeAssistant.apk
        ls -la *.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-apk
        path: '*.apk'

    - name: Create Release
      if: github.ref == 'refs/heads/master' && success()
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        draft: false
        prerelease: false
        body: "Auto-generated release from build ${{ github.run_number }}"

    - name: Upload Release Asset
      if: github.ref == 'refs/heads/master' && success()
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./*.apk
        asset_name: OpenClawHomeAssistant.apk
        asset_content_type: application/vnd.android.package-archive
