name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix Gradle Wrapper
      run: |
        cd openclaw-clients/android
        rm -f gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Setup Chinese mirrors for faster downloads
      run: |
        cp openclaw-clients/android/init.gradle openclaw-clients/android/gradle/init.gradle

    - name: Build with Gradle wrapper
      working-directory: openclaw-clients/android
      run: ./gradlew assembleDebug --no-daemon --build-cache --stacktrace

    - name: Rename APK with timestamp
      run: |
        TIMESTAMP=$(date +%Y%m%d_%H%M)
        cp openclaw-clients/android/app/build/outputs/apk/debug/app-debug.apk OpenClawHomeAssistant_${TIMESTAMP}.apk
        ls -la *.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-apk
        path: '*.apk'

    - name: Create Release
      if: github.ref == 'refs/heads/master'
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: "Release $(date +%Y%m%d)"
        tag_name: "v$(date +%Y%m%d)"
        draft: false
        prerelease: false
        files: '*.apk'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}