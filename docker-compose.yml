version: "3.8"

services:
  yuanfang:
    build: .
    container_name: yuanfang
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yuanfang-net

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: yuanfang-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuanfang-net

  redis:
    image: redis:7-alpine
    container_name: yuanfang-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuanfang-net

volumes:
  qdrant-data:
  redis-data:

networks:
  yuanfang-net:
    driver: bridge
