<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 外圈光环 -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.6"/>
  <!-- 内圈 -->
  <circle cx="96" cy="96" r="58" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.3"/>
  <!-- 机器人头部 -->
  <rect x="66" y="68" width="60" height="48" rx="12" fill="#1e2a3a" stroke="url(#ring)" stroke-width="2"/>
  <!-- 眼睛 -->
  <circle cx="82" cy="88" r="6" fill="#00d4ff"/>
  <circle cx="110" cy="88" r="6" fill="#00d4ff"/>
  <!-- 嘴巴 -->
  <rect x="82" y="100" width="28" height="3" rx="1.5" fill="#7c3aed" opacity="0.8"/>
  <!-- 天线 -->
  <line x1="96" y1="68" x2="96" y2="52" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="96" cy="48" r="4" fill="#00d4ff"/>
  <!-- 文字 "YF" -->
  <text x="96" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="22" fill="#00d4ff">YF</text>
</svg>
