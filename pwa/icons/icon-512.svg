<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 外圈光环 -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.6"/>
  <!-- 内圈 -->
  <circle cx="256" cy="256" r="154" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <!-- 机器人头部 -->
  <rect x="176" y="180" width="160" height="128" rx="32" fill="#1e2a3a" stroke="url(#ring)" stroke-width="4"/>
  <!-- 眼睛 -->
  <circle cx="218" cy="234" r="16" fill="#00d4ff"/>
  <circle cx="294" cy="234" r="16" fill="#00d4ff"/>
  <!-- 嘴巴 -->
  <rect x="218" y="268" width="76" height="6" rx="3" fill="#7c3aed" opacity="0.8"/>
  <!-- 天线 -->
  <line x1="256" y1="180" x2="256" y2="138" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="128" r="10" fill="#00d4ff"/>
  <!-- 文字 "YF" -->
  <text x="256" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="58" fill="#00d4ff">YF</text>
</svg>
